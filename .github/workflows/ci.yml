name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Checking project structure..."
          test -d programs/pxmon/src && echo "  programs/pxmon OK"
          test -d sdk/src && echo "  sdk OK"
          test -d api/src && echo "  api OK"
          test -d agents/src && echo "  agents OK"
          echo "All checks passed."
